<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Premium Telegram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Premium Dark Blue Gradient */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 350px;
            width: 85%;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            color: #FFD700; /* Gold Color */
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            letter-spacing: 1px;
        }

        p {
            font-size: 15px;
            margin-bottom: 35px;
            color: #dcdcdc;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(45deg, #00b09b, #96c93d); /* Fresh Green Gradient */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 8px 15px rgba(0, 176, 155, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 80%;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0, 176, 155, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🏏</div>
        <h1>Free Match Predictions</h1>
        <p>Get Daily Sure Tips, Expert Analysis, and Winning Updates straight to your phone. Join the community now!</p>
        <a href="https://t.me/CrownCricketTips" class="btn">🚀 JOIN TELEGRAM</a>
    </div>

</body>
</html>
